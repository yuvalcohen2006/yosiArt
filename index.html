<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <!-- <title> + <meta name="description"> are injected per-page by the
         <SEO /> component (react-helmet-async); leaving them out of
         index.html keeps the rendered HTML free of duplicates. -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the contact-page link icon so it's cached on first load
         even if the visitor never opens /contact. -->
    <link
      rel="preload"
      href="/link-icon.svg"
      as="image"
      type="image/svg+xml"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&family=Frank+Ruhl+Libre:wght@400;500;600;700&family=Heebo:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
